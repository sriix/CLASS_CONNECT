<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body.auth-bg {
      /* Add your background image below */
      /* Example: background: url('your-image.jpg') no-repeat center center fixed; */
      background: url('images/Login.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>
<body class="auth-bg">
  <div class="auth-container" style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
    <div class="auth-card" style="background:#fff;padding:2.5rem 2rem 2rem 2rem;border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,0.13);width:100%;max-width:380px;">
      <h2 style="text-align:center;margin-bottom:1.5rem;font-weight:600;">Login</h2>
      <form id="loginForm" autocomplete="off" novalidate>
        <label for="username" style="font-weight:500;">Username</label>
        <input type="text" id="username" name="username" required autocomplete="off" style="width:100%;padding:0.7rem;margin-bottom:0.2rem;border-radius:8px;border:1px solid #ccc;font-size:1rem;" />
        <small id="usernameHelp" style="color:#c00;display:none;margin-bottom:0.8rem;"></small>

        <label for="password" style="font-weight:500;">Password</label>
        <input type="password" id="password" name="password" required autocomplete="off" style="width:100%;padding:0.7rem;margin-bottom:0.2rem;border-radius:8px;border:1px solid #ccc;font-size:1rem;" />
        <small id="passwordHelp" style="color:#c00;display:none;margin-bottom:0.8rem;"></small>

        <button type="submit" class="login-btn" style="width:100%;padding:0.8rem;background:#007bff;color:#fff;border:none;border-radius:8px;font-size:1.1rem;font-weight:600;margin-top:0.5rem;cursor:pointer;">Login</button>
      </form>
      <div id="login-error" style="color:#c00;margin-top:10px;text-align:center;"></div>
    </div>
  </div>
  <script>
    function validatePassword(password) {
      // At least 1 uppercase, 1 special char, 1 number, min 8 chars
      const regex = /^(?=.*[A-Z])(?=.*[!@#$%^&*()_+\-=[\]{};':"\\|,.<>/?])(?=.*\d).{8,}$/;
      return regex.test(password);
    }
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('login-error');
      const usernameHelp = document.getElementById('usernameHelp');
      const passwordHelp = document.getElementById('passwordHelp');
      usernameHelp.style.display = 'none';
      passwordHelp.style.display = 'none';
      errorDiv.textContent = '';
      let hasError = false;
      if (!username) {
        usernameHelp.textContent = 'Username is required.';
        usernameHelp.style.display = 'block';
        hasError = true;
      }
      if (!password) {
        passwordHelp.textContent = 'Password is required.';
        passwordHelp.style.display = 'block';
        return;
      }
      if (!validatePassword(password) || password !== 'Password@123') {
        passwordHelp.textContent = 'Wrong password.';
        passwordHelp.style.display = 'block';
        return;
      }
      if (hasError) return;
      // On success, redirect (replace with backend call as needed)
      window.location.href = 'loggedin.html';
    });
  </script>
</body>
</html>
