<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>लॉगिन - Class_c.jpg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      /* Paste your image below as the background */
      /* Example: url('class-connect.jpg') */
      background: url('Books.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
    }
    .dashboard-main {
      background: rgba(255,255,255,0.85);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
      margin: auto;
    }
    .auth-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
    }
  </style>
</head>
<body>
  <header class="main-header">
    <div class="nav-left">
      <a href="index.html" class="logo">
        <img src="images/logo.jpg" alt="StrategIQ Logo" style="height:64px; width:auto; display:block;">
      </a>
      <nav class="main-nav">
        <a href="index.html" class="nav-link active">डैशबोर्ड</a>
        <a href="reports.html" class="nav-link admin-only">रिपोर्ट</a>
      </nav>
    </div>
    <div class="nav-right">
      <div class="lang-switch">
        <a href="index.html">English</a> | <a href="login_h.html" class="active">हिन्दी</a>
      </div>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="auth-container">
      <div class="auth-card">
        <h2>लॉगिन</h2>
        <form id="loginForm">
          <label for="userid">मोबाइल नंबर या यूज़र आईडी</label>
          <input type="text" id="userid" name="userid" required />

          <label for="password">पासवर्ड</label>
          <input type="password" id="password" name="password" required />

          <button type="submit" class="login-btn">लॉगिन</button>
          <button type="button" class="otp-btn">ओटीपी से लॉगिन करें</button>
        </form>
        <div class="auth-links">
          <a href="forgot.html">पासवर्ड भूल गए?</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    &copy; 2025 टीम StrategIQ — स्मार्ट इंडिया हैकथॉन | <a href="help.html">सहायता और समर्थन</a>
  </footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      window.location.href = 'loggedin_h.html';
    });
  </script>
</body>
</html>
